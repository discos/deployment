name: DISCOS provisioning and deployment on Docker container

on:
  workflow_dispatch:
  pull_request:
  push:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  packages: write

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      REPOSITORY_TOKEN: "${{ secrets.DEPENDENCIES_TOKEN }}"
    steps:
      - name: Free up space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
      - name: Clone the repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          check-latest: true
      - name: Install package and dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r test_requirements.txt
          pip install .
      - name: Check if the Ansible procedure is correctly written
        run: |
          ansible-lint ansible
      - name: Provision the container
        run: |
          if [[ "$RUNNER_DEBUG" == "1" ]]; then
            discos-deploy manager:development --docker --default-passwords -v
          else
            discos-deploy manager:development --docker --default-passwords
          fi
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push images to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          IMAGE_TAG="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
          discos-container tag latest "${IMAGE_TAG}"
          discos-container -v push --tag latest
          discos-container -v push --tag "${IMAGE_TAG}"
      - name: Shutdown the container
        if: always()
        run: |
          discos-container stop || true
