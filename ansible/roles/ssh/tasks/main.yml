---

- name: Prevent ssh to accept different localizations
  ansible.builtin.replace:
    dest: /etc/ssh/sshd_config
    regexp: '^AcceptEnv'
    replace: '# AcceptEnv'


- name: Disable DNS for ssh
  ansible.builtin.replace:
    dest: /etc/ssh/sshd_config
    regexp: '^#UseDNS yes$'
    replace: 'UseDNS no'


- name: Disable gnome-ssh-askpass
  ansible.builtin.lineinfile:
    dest: /etc/bashrc
    line: 'unset SSH_ASKPASS'


- name: Disable GSSAPIAuthentication for ssh
  ansible.builtin.replace:
    dest: /etc/ssh/sshd_config
    regexp: '^GSSAPIAuthentication yes$'
    replace: 'GSSAPIAuthentication no'


- name: Restart ssh service of the remote machine
  ansible.builtin.service:
    name: sshd
    state: restarted
    use: systemd


- name: Fix SSH login issue for non-root users in Docker (pam_loginuid)
  ansible.builtin.replace:
    path: /etc/pam.d/sshd
    regexp: '^session\s+required\s+pam_loginuid\.so'
    replace: 'session    optional     pam_loginuid.so'
  become: true
  when: ansible_virtualization_type == 'docker'
