---

- name: Delete any OS welcome message
  ansible.builtin.command: "truncate -s 0 /etc/motd"
  changed_when: true


- name: Clean the pip cache to save some space
  ansible.builtin.command: "pip cache purge"
  become: true
  become_user: "{{ item.value.name }}"
  become_flags: "-i"
  with_dict: "{{ users }}"
  changed_when: true


- name: Clean the yum cache to save some space
  ansible.builtin.command: "yum clean all"
  changed_when: true


- name: Remove maven cache to save some space
  ansible.builtin.file:
    path: "/{{ discos_sw_dir }}/{{ item.value.name }}/.m2"
    state: absent
  with_dict: "{{ users }}"


- name: Clean user cache to save some space
  ansible.builtin.file:
    path: "/{{ discos_sw_dir }}/{{ item.value.name }}/.cache"
    state: absent
  with_dict: "{{ users }}"


- name: Install pyclean and clean some python environments
  ansible.builtin.command: "{{ item }}"
  loop:
    - "pip install pyclean"
    - "pyclean /alma"
    - "pyclean /usr"
    - "pyclean /{{ discos_sw_dir }}"
  changed_when: true


- name: Remove the temporary directory used for libraries compilation
  ansible.builtin.file:
    path: "{{ remote_build_path }}"
    state: absent


- name: Fetch the local user's public key
  ansible.builtin.command: "cat ~/.ssh/id_rsa.pub"
  register: local_public_key
  delegate_to: localhost
  run_once: true
  changed_when: false


- name: Remove the local user's public key from remote .ssh/authorized_hosts file
  ansible.builtin.lineinfile:
    path: "~/.ssh/authorized_keys"
    line: "{{ local_public_key.stdout }}"
    state: absent


- name: Remove the remote repository token
  ansible.builtin.file:
    path: "{{ local_repository_path }}/token"
    state: absent
  delegate_to: localhost
  run_once: true
