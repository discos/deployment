---

- name: Check presence of dependencies on local repository
  tags: provision
  hosts: manager
  tasks:
    - name: Check presence of dependencies on local repository
      ansible.builtin.import_role:
        name: dependencies
      delegate_to: localhost
      run_once: true


- name: Check users presence and eventually ask for their password
  tags: provision
  hosts: manager
  tasks:
    - name: Check users presence and eventually ask for their password
      ansible.builtin.include_role:
        name: ask_password
      with_dict: "{{ users }}"


- name: Patch yum repositories
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - yum_repos


- name: Configure SELINUX
  tags: provision
  hosts: manager
  remote_user: root
  tasks:
    - name: Configure SELINUX
      ansible.builtin.include_role:
        name: selinux
      when: ansible_virtualization_type != "docker"


- name: Install yum packages
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - yum


- name: Apply Docker-specific configuration
  tags: provision
  hosts: manager
  remote_user: root
  tasks:
    - name: Apply Docker-specific configuration
      ansible.builtin.include_role:
        name: docker
      when: ansible_virtualization_type == "docker"


- name: Configure network
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - network


- name: Configure firewall
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - firewall


- name: Configure SSH
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - ssh


- name: Configure time
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - time


- name: Configure users and groups
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - users


- name: Perform the key exchange procedure
  tags: provision
  hosts: manager
  tasks:
    - name: Perform the key exchange procedure
      ansible.builtin.include_role:
        name: key_exchange
      loop: "{{ key_exchange_users }}"
      loop_control:
        loop_var: username


- name: Commit current container checkpoint
  tags: provision
  hosts: manager
  tasks:
    - name: Commit current container checkpoint
      ansible.builtin.command: "discos-container checkpoint"
      delegate_to: localhost
      run_once: true
      changed_when: false
      when: ansible_virtualization_type == "docker"


- name: Prepare for ACS setup
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - acs_prepare
    - acs_environment


- name: Commit current container checkpoint
  tags: provision
  hosts: manager
  tasks:
    - name: Commit current container checkpoint
      ansible.builtin.command: "discos-container checkpoint"
      delegate_to: localhost
      run_once: true
      changed_when: false
      when: ansible_virtualization_type == "docker"


- name: Install ACS
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - acs_install
    - discos_dependencies


- name: Commit current container checkpoint
  tags: provision
  hosts: manager
  tasks:
    - name: Commit current container checkpoint
      ansible.builtin.command: "discos-container checkpoint"
      delegate_to: localhost
      run_once: true
      changed_when: false
      when: ansible_virtualization_type == "docker"


- name: Configure the manager machine
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - manager


- name: Install BASIE
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - basie


- name: Install DISCOS Simulators
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - simulators


- name: Install SAOImageDS9
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - ds9


- name: Install srt-single-dish-tools
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - sdtools


- name: Configure the quicklook
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - quicklook


- name: Apply configuration for project users
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - projects


- name: Configure the VNC servers
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - vnc


- name: Commit current container checkpoint
  tags: provision
  hosts: manager
  tasks:
    - name: Commit current container checkpoint
      ansible.builtin.command: "discos-container checkpoint"
      delegate_to: localhost
      run_once: true
      changed_when: false
      when: ansible_virtualization_type == "docker"


- name: Deploy DISCOS
  tags: deploy
  hosts: manager
  remote_user: root
  roles:
    - deploy


- name: Test the DISCOS CDB
  tags:
    - deploy
    - cdb
  hosts: manager
  remote_user: root
  roles:
    - cdb_test


- name: Finalize the installation
  tags: provision
  hosts: manager
  remote_user: root
  roles:
    - finalize
